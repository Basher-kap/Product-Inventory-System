<!-- app/pages/change-password.html-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="stylesheet" href="../../style.css">

    <style>
        .change-password-box {
            position: relative;
            z-index: 1;
            max-width: 420px;
            margin: 60px auto;
            padding: 40px 36px;
            background: rgba(255, 253, 245, 0.30);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1.5px solid rgba(168, 214, 200, 0.55);
            border-radius: 18px;
            box-shadow:
                0 8px 36px rgba(80, 140, 120, 0.12),
                0 1px 0 rgba(255, 255, 255, 0.6) inset;
            animation: floatIn 1s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        .change-password-box h1 { margin-bottom: 24px; }
        .change-password-box label { display: block; margin-bottom: 6px; margin-top: 16px; }
        .change-password-box label:first-of-type { margin-top: 0; }
        .change-password-box input { margin-bottom: 0; }
        .change-password-box button { margin-top: 24px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="homepage.html" style="color: white; font-size: 18px; font-weight: bold; text-decoration: none;">ITE193</a>
        <div class="navbar-right">
            <div class="profile">
                <div class="profile-icon" id="profile-icon"></div>
                <span id="profile-username"></span>
            </div>
        </div>
    </nav>
    
    <div class="change-password-box">
        <h1>Change Password</h1>
        <label for="old-password">Old Password:</label>
        <input type="password" id="old-password" placeholder="Enter old password">
        <label for="new-password">New Password:</label>
        <input type="password" id="new-password" placeholder="Enter new password">
        <label for="confirm-password">Confirm New Password:</label>
        <input type="password" id="confirm-password" placeholder="Re-type new password">
        <button type="button" onclick="handleChangePassword()">Change Password</button>
    </div>

    <script src="../controllers/change-password.js"></script>
</body>
</html>
