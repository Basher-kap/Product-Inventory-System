<!-- app/pages/register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>

    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <!-- 3.1 Menu Enhancement (Create new user account) register form UI (register.html)-->
    <div class="registerbox">
        <h1>Create Account</h1>

        <label for="username">Username:</label>
        <input type="text" id="username" placeholder="Enter username">

        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter password">

        <label for="confirmPassword">Confirm Password:</label>
        <input type="password" id="confirmPassword" placeholder="Re-type password">

        <button type="button" 
                onclick="handleRegister()">
                Create Account
        </button>

        <p style="margin-top: 16px; text-align: center;">
            Already have an account? 
            <a href="/app/login.html">Login here</a>
        </p>
    </div>

    <script src="/app/controllers/register.js"></script>
</body>
</html>
